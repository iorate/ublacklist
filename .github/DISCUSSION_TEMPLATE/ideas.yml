body:
  - type: markdown
    attributes:
      value: |
        Feel free to suggest your feature idea.

        > **Looking to add support for a search engine?** uBlacklist will not add new built-in search engine support. Write your own SERPINFO ([guide](https://ublacklist.github.io/docs/serpinfo)) or subscribe to one published by others. If you need help, ask in [Q&A](https://github.com/iorate/ublacklist/discussions/categories/q-a) instead of opening an idea here.

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe your idea. What problem does it solve? How would it work?"
      placeholder: |
        - What problem are you trying to solve?
        - How would this feature work?
        - How would users benefit from it?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      description: "Please confirm:"
      options:
        - label: "I have searched existing discussions and issues to ensure this idea hasn't been suggested before"
          required: true
        - label: "I'm willing to help implement this feature (write code, test, etc.)"
          required: false
