name: Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true
          cache: true

      - name: Build and archive (Chrome)
        run: |
          pnpm build
          mkdir -p dist/release/chrome dist/release/github
          (cd dist/chrome && zip -qr ../release/chrome/package.zip .)
          cp dist/release/chrome/package.zip dist/release/github/chrome.zip
        env:
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}

      - name: Build and archive (Edge)
        # Edge Add-ons rejects a manifest with the `key` field.
        run: |
          mkdir -p dist/release/edge dist/release/github
          pnpm build --browser edge --no-key
          (cd dist/edge-no-key && zip -qr ../release/edge/package.zip .)
          pnpm build --browser edge
          (cd dist/edge && zip -qr ../release/github/edge.zip .)
        env:
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}

      - name: Build and archive (Firefox)
        run: |
          pnpm build --browser firefox
          mkdir -p dist/release/firefox dist/release/github
          (cd dist/firefox && zip -qr ../release/firefox/package.zip .)
          cp dist/release/firefox/package.zip dist/release/github/firefox.zip
        env:
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}

      - name: Copy store notes
        run: |
          cp release/edge/notes-for-certification.txt dist/release/edge/
          cp release/firefox/approval-notes.txt dist/release/firefox/

      - name: Build release notes
        run: pnpm node scripts/build-release-notes.ts "https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release
          path: dist/release

  chrome:
    needs: build

    environment: chrome

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: dist/release

      - name: Install wepub
        uses: iorate/setup-wepub@e37aebcc98937c8bfa4e22a438a4b89a75b4e349 # v1.0.0

      - name: Publish to Chrome Web Store
        run: wepub chrome dist/release/chrome/package.zip
        env:
          WEPUB_CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          WEPUB_CHROME_ITEM_ID: ${{ vars.CHROME_ITEM_ID }}
          WEPUB_CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          WEPUB_CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          WEPUB_CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  edge:
    needs: build

    environment: edge

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: dist/release

      - name: Install wepub
        uses: iorate/setup-wepub@e37aebcc98937c8bfa4e22a438a4b89a75b4e349 # v1.0.0

      - name: Publish to Edge Add-ons
        run: wepub edge dist/release/edge/package.zip --notes-file dist/release/edge/notes-for-certification.txt
        env:
          WEPUB_EDGE_PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          WEPUB_EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          WEPUB_EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

  firefox:
    needs: build

    environment: firefox

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: dist/release

      - name: Archive source
        run: |
          git ls-files --recurse-submodules | zip -q -@ dist/release/firefox/source.zip
          {
            echo "DROPBOX_API_KEY=$DROPBOX_API_KEY"
            echo "DROPBOX_API_SECRET=$DROPBOX_API_SECRET"
            echo "GOOGLE_DRIVE_API_KEY=$GOOGLE_DRIVE_API_KEY"
            echo "GOOGLE_DRIVE_API_SECRET=$GOOGLE_DRIVE_API_SECRET"
          } > .env
          zip -q dist/release/firefox/source.zip .env
          rm .env
        env:
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}

      - name: Install wepub
        uses: iorate/setup-wepub@e37aebcc98937c8bfa4e22a438a4b89a75b4e349 # v1.0.0

      - name: Publish to Firefox Add-ons
        run: |
          wepub firefox dist/release/firefox/package.zip \
            --channel listed \
            --compatibility firefox,android \
            --approval-notes-file dist/release/firefox/approval-notes.txt \
            --release-notes-file dist/release/firefox/release-notes.md \
            --source dist/release/firefox/source.zip
        env:
          WEPUB_FIREFOX_ADDON_ID: ${{ vars.FIREFOX_ADDON_ID }}
          WEPUB_FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          WEPUB_FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}

  github:
    needs: [build, chrome, edge, firefox]

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: dist/release

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file dist/release/github/release-notes.md \
            "dist/release/github/chrome.zip#ublacklist-$TAG-chrome.zip" \
            "dist/release/github/edge.zip#ublacklist-$TAG-edge.zip" \
            "dist/release/github/firefox.zip#ublacklist-$TAG-firefox.zip"
        env:
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
