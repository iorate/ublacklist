name: Release

on:
  workflow_dispatch:
    inputs:
      skip_chrome:
        type: boolean
        default: false
        description: Skip Chrome Web Store submission
      skip_edge:
        type: boolean
        default: false
        description: Skip Microsoft Edge Add-ons submission
      skip_firefox:
        type: boolean
        default: false
        description: Skip Firefox Add-ons submission

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0 # git-cliff needs full history

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: true
          cache: true

      - name: Install git-cliff
        uses: taiki-e/install-action@13608cbb45b01feb47ef444ab1a42dc41ad56f1a # v2.79.11
        with:
          tool: git-cliff

      - name: Install wepub
        uses: iorate/setup-wepub@e37aebcc98937c8bfa4e22a438a4b89a75b4e349 # v1.0.0

      - name: Determine next version
        id: next-version
        run: |
          context=$(git-cliff --unreleased --bump --context)
          if ! jq -e '.[0].bump_type' <<<"$context" >/dev/null; then
            echo "::error::No version bump since the latest release" >&2
            exit 1
          fi
          tag=$(jq -r '.[0].version' <<<"$context")
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure dist directory
        run: mkdir -p dist

      - name: Build and archive (Chrome)
        env:
          VERSION: ${{ steps.next-version.outputs.version }}
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}
        run: |
          pnpm build --version "$VERSION"
          (cd dist/chrome && zip -qr ../chrome.zip .)

      - name: Build and archive (Edge)
        env:
          VERSION: ${{ steps.next-version.outputs.version }}
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}
        run: |
          pnpm build --browser edge --version "$VERSION"
          (cd dist/edge && zip -qr ../edge.zip .)

      - name: Build and archive (Firefox)
        env:
          VERSION: ${{ steps.next-version.outputs.version }}
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}
        run: |
          pnpm build --browser firefox --version "$VERSION"
          (cd dist/firefox && zip -qr ../firefox.zip .)

      - name: Archive source
        env:
          DROPBOX_API_KEY: ${{ secrets.DROPBOX_API_KEY }}
          DROPBOX_API_SECRET: ${{ secrets.DROPBOX_API_SECRET }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_API_SECRET: ${{ secrets.GOOGLE_DRIVE_API_SECRET }}
        run: |
          git ls-files --recurse-submodules | zip -q -@ dist/source.zip
          {
            echo "DROPBOX_API_KEY=$DROPBOX_API_KEY"
            echo "DROPBOX_API_SECRET=$DROPBOX_API_SECRET"
            echo "GOOGLE_DRIVE_API_KEY=$GOOGLE_DRIVE_API_KEY"
            echo "GOOGLE_DRIVE_API_SECRET=$GOOGLE_DRIVE_API_SECRET"
          } > .env
          zip -q dist/source.zip .env
          rm .env

      - name: Generate notes for certification (Edge)
        env:
          TAG: ${{ steps.next-version.outputs.tag }}
        run: |
          # shellcheck disable=SC2016 # envsubst reads $VAR as an allowlist literal
          envsubst '$TAG' < release/notes-for-certification.template.txt > dist/notes-for-certification.txt

      - name: Generate approval notes (Firefox)
        env:
          VERSION: ${{ steps.next-version.outputs.version }}
        run: |
          # shellcheck disable=SC2016 # envsubst reads $VAR as an allowlist literal
          envsubst '$VERSION' < release/approval-notes.template.txt > dist/approval-notes.txt

      - name: Generate release notes
        env:
          TAG: ${{ steps.next-version.outputs.tag }}
        run: git-cliff --tag "$TAG" --unreleased > dist/release-notes.md

      - name: Publish to Chrome Web Store
        if: ${{ !inputs.skip_chrome }}
        env:
          WEPUB_CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          WEPUB_CHROME_ITEM_ID: ${{ vars.CHROME_ITEM_ID }}
          WEPUB_CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          WEPUB_CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          WEPUB_CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: wepub chrome dist/chrome.zip

      - name: Publish to Microsoft Edge Add-ons
        if: ${{ !inputs.skip_edge }}
        env:
          WEPUB_EDGE_PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          WEPUB_EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          WEPUB_EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: wepub edge dist/edge.zip --notes-file dist/notes-for-certification.txt

      - name: Publish to Firefox Add-ons
        if: ${{ !inputs.skip_firefox }}
        env:
          WEPUB_FIREFOX_ADDON_ID: ${{ vars.FIREFOX_ADDON_ID }}
          WEPUB_FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          WEPUB_FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: |
          wepub firefox dist/firefox.zip \
            --channel listed \
            --compatibility firefox,android \
            --approval-notes-file dist/approval-notes.txt \
            --release-notes-file dist/release-notes.md \
            --source dist/source.zip

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.next-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file dist/release-notes.md \
            "dist/chrome.zip#ublacklist-$TAG-chrome.zip" \
            "dist/edge.zip#ublacklist-$TAG-edge.zip" \
            "dist/firefox.zip#ublacklist-$TAG-firefox.zip"
