name: Release

on:
  push:
    branches:
      - master

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}

jobs:
  release:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true
          cache: true

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Detect change intents
        id: detect-intents
        run: |
          status=$(pnpm change status)
          echo "$status"
          if grep -q '^Pending change intents:' <<< "$status"; then
            echo 'found=true' >> "$GITHUB_OUTPUT"
          elif grep -q '^No pending changes\.' <<< "$status"; then
            echo 'found=false' >> "$GITHUB_OUTPUT"
          else
            echo 'Unrecognized "pnpm change status" output.' >&2
            exit 1
          fi

      - name: Bump version and changelog
        if: steps.detect-intents.outputs.found == 'true'
        run: pnpm version -r

      - name: Build version pull request body
        if: steps.detect-intents.outputs.found == 'true'
        run: pnpm node release/scripts/build-version-pr-body.ts "$RUNNER_TEMP/version-pr-body.md"

      - name: Create version pull request
        if: steps.detect-intents.outputs.found == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: Version Packages
          branch: version-pr
          sign-commits: true
          title: Version Packages
          body-path: ${{ runner.temp }}/version-pr-body.md

      - name: Create and push tag
        if: steps.detect-intents.outputs.found == 'false'
        run: |
          version=$(node -p "require('./package.json').version")
          if git ls-remote --exit-code origin "refs/tags/v$version" > /dev/null; then
            echo "Tag v$version already exists; nothing to do."
            exit 0
          fi
          git tag "v$version"
          git push origin "refs/tags/v$version"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GIT_CONFIG_COUNT: 2
          GIT_CONFIG_KEY_0: credential.helper
          GIT_CONFIG_VALUE_0: ""
          GIT_CONFIG_KEY_1: credential.helper
          GIT_CONFIG_VALUE_1: "!gh auth git-credential"
