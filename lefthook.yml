pre-commit:
  # Run serially: parallel `pnpm` invocations race on pnpm's deps-status check.
  jobs:
    - name: biome
      run: pnpm biome check --write --files-ignore-unknown=true --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: prettier
      glob: "*.{md,yaml,yml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
